<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horloge Miroir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Miroir Tracker</h1>
        
        <div id="clock" onclick="checkMirrorTime()">
            <div class="dot"></div>
            <div id="hour-hand" class="hand hour"></div>
            <div id="min-hand" class="hand min"></div>
            <div id="sec-hand" class="hand sec"></div>
            
            <div id="frozen-hands"></div>
        </div>
        
        
    </div>

    <script src="script.js"></script>
</body>
</html>
